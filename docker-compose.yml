services:

  backend:
    build:
      context: ./backend
    container_name: budhi-backend
    env_file:
      - .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - ollama

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: budhi-worker
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: budhi-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"

  redis:
    image: redis:7-alpine
    container_name: budhi-redis
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama
    container_name: budhi-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  nginx:
    image: nginx:stable-alpine
    container_name: budhi-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend

volumes:
  ollama_data: